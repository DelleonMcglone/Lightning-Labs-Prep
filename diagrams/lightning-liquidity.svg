<svg viewBox="0 0 920 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title id="title">Lightning Channel Liquidity</title>
  <desc id="desc">A channel's total capacity is fixed at open. Only the inbound/outbound split moves as payments flow. Three states show a channel opening with all funds on the peer's side (Alice has full inbound), shifting as Alice receives payments, then depleting so Alice can no longer receive.</desc>

  <!-- background -->
  <rect x="6" y="6" width="908" height="648" rx="18" fill="#FBFBFD" stroke="#E6E6F0" stroke-width="1.5"/>

  <!-- header -->
  <text x="460" y="48" text-anchor="middle" font-size="27" font-weight="700" fill="#1A1A2E">Lightning Channel Liquidity</text>
  <text x="460" y="74" text-anchor="middle" font-size="14" fill="#6B6B80">Total capacity is fixed at open — only the inbound / outbound split moves as payments flow</text>

  <!-- actors + channel -->
  <text x="460" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#7B2FF7">Channel · 10,000,000 sats · capacity fixed at open</text>
  <line x1="178" y1="140" x2="742" y2="140" stroke="#C2C2D2" stroke-width="2.5" stroke-dasharray="6 6"/>

  <!-- Alice -->
  <circle cx="142" cy="140" r="33" fill="#F7931A"/>
  <text x="142" y="149" text-anchor="middle" font-size="26" font-weight="700" fill="#FFFFFF">A</text>
  <text x="142" y="192" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A2E">Alice</text>
  <text x="142" y="208" text-anchor="middle" font-size="11.5" fill="#6B6B80">merchant · receiver</text>

  <!-- Bob -->
  <circle cx="778" cy="140" r="33" fill="#2BB5A0"/>
  <text x="778" y="149" text-anchor="middle" font-size="26" font-weight="700" fill="#FFFFFF">B</text>
  <text x="778" y="192" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A2E">Bob</text>
  <text x="778" y="208" text-anchor="middle" font-size="11.5" fill="#6B6B80">peer · opens channel</text>

  <!-- ===== State 1 ===== -->
  <text x="210" y="246" font-size="14" font-weight="700" fill="#1A1A2E">1 · Channel opened</text>
  <text x="810" y="246" text-anchor="end" font-size="12" fill="#6B6B80">Bob funded the channel</text>
  <g>
    <rect x="210" y="254" width="600" height="40" rx="8" fill="#2BB5A0"/>
    <rect x="210" y="254" width="600" height="40" rx="8" fill="none" stroke="#1A1A2E" stroke-opacity="0.08" stroke-width="1"/>
    <text x="510" y="279" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Bob holds 10M  →  Alice inbound = 10M (can receive), outbound = 0</text>
  </g>

  <text x="460" y="320" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7B2FF7">↓  Alice receives payments — funds slide to her side</text>

  <!-- ===== State 2 ===== -->
  <text x="210" y="350" font-size="14" font-weight="700" fill="#1A1A2E">2 · After receiving 6M sats</text>
  <text x="810" y="350" text-anchor="end" font-size="12" fill="#6B6B80">total capacity unchanged</text>
  <g>
    <rect x="210" y="358" width="360" height="40" rx="8" fill="#F7931A"/>
    <rect x="570" y="358" width="240" height="40" rx="8" fill="#2BB5A0"/>
    <!-- re-round outer corners cleanly -->
    <rect x="210" y="358" width="600" height="40" rx="8" fill="none" stroke="#1A1A2E" stroke-opacity="0.08" stroke-width="1"/>
    <text x="390" y="383" text-anchor="middle" font-size="12.5" font-weight="600" fill="#FFFFFF">6M outbound</text>
    <text x="690" y="383" text-anchor="middle" font-size="12.5" font-weight="600" fill="#FFFFFF">4M inbound</text>
  </g>

  <text x="460" y="424" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7B2FF7">↓  Channel keeps depleting toward Alice</text>

  <!-- ===== State 3 ===== -->
  <text x="210" y="454" font-size="14" font-weight="700" fill="#1A1A2E">3 · Channel depleted</text>
  <text x="810" y="454" text-anchor="end" font-size="12" fill="#D14343">Alice can no longer receive</text>
  <g>
    <rect x="210" y="462" width="600" height="40" rx="8" fill="#F7931A"/>
    <rect x="210" y="462" width="600" height="40" rx="8" fill="none" stroke="#1A1A2E" stroke-opacity="0.08" stroke-width="1"/>
    <text x="510" y="487" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Alice holds 10M  →  inbound = 0.  Push funds out (Loop / pay) to receive again</text>
  </g>

  <!-- legend -->
  <rect x="210" y="534" width="16" height="16" rx="3" fill="#F7931A"/>
  <text x="234" y="547" font-size="12.5" fill="#1A1A2E">Alice's balance = her <tspan font-weight="700">outbound</tspan> (sending) capacity</text>
  <rect x="540" y="534" width="16" height="16" rx="3" fill="#2BB5A0"/>
  <text x="564" y="547" font-size="12.5" fill="#1A1A2E">Peer's balance = Alice's <tspan font-weight="700">inbound</tspan> (receiving) capacity</text>

  <!-- footer identity -->
  <line x1="210" y1="572" x2="810" y2="572" stroke="#E6E6F0" stroke-width="1.5"/>
  <text x="460" y="598" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1A1A2E">Alice's inbound capacity  =  Bob's outbound capacity</text>
  <text x="460" y="618" text-anchor="middle" font-size="11.5" fill="#6B6B80">Total capacity never changes without an on-chain transaction · a small reserve means a channel can't be fully emptied</text>
</svg>
